<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Halstead Holdings — SOW Builder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #f0ede8; min-height: 100vh; }
  #app { max-width: 720px; margin: 0 auto; background: #111; min-height: 100vh; padding: 1.25rem; padding-bottom: 100px; }
  .top-bar { text-align: center; padding: 1rem 0 0.75rem; border-bottom: 1px solid #2a2a2a; margin-bottom: 1.25rem; position: relative; }
  .top-bar img { width: 180px; }
  .step-pills { display: flex; gap: 4px; justify-content: center; margin-bottom: 1.25rem; }
  .step-pill { width: 36px; height: 4px; border-radius: 2px; background: #2a2a2a; transition: background 0.3s; }
  .step-pill.active { background: #C9922A; }
  .step-pill.done { background: #639922; }
  .step-label { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; margin-bottom: 1.25rem; }
  .page-title { font-size: 18px; font-weight: 600; color: #f0ede8; margin-bottom: 0.25rem; }
  .page-subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .section-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.6rem; font-weight: 600; }
  .inspection-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px 20px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .inspection-card:active { background: #1e1e1e; }
  .inspection-card.selected { background: #2a1f0a; border-color: #C9922A; }
  .inspection-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .inspection-card-title { font-weight: 600; font-size: 15px; }
  .inspection-card-id { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: #555; }
  .inspection-card-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: #888; }
  .inspection-card-meta span.flag-good { color: #639922; }
  .inspection-card-meta span.flag-yellow { color: #C9922A; }
  .inspection-card-meta span.flag-red { color: #A32D2D; }
  .empty-state { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 40px 20px; text-align: center; }
  .empty-state .title { font-size: 15px; color: #888; margin-bottom: 8px; }
  .empty-state .subtitle { font-size: 12px; color: #555; }
  .turn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .turn-btn { padding: 20px 16px; border-radius: 8px; cursor: pointer; text-align: center; background: #1a1a1a; border: 1px solid #2a2a2a; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .turn-btn.selected { background: #2a1f0a; border-color: #C9922A; }
  .turn-btn .name { font-weight: 700; font-size: 16px; color: #f0ede8; margin-bottom: 4px; }
  .turn-btn.selected .name { color: #C9922A; }
  .turn-btn .phases { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: #666; }
  .turn-desc { font-size: 12px; color: #555; margin-bottom: 20px; line-height: 1.5; min-height: 18px; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: 1fr; }
    .turn-grid { grid-template-columns: 1fr; }
  }
  .summary-row { display: flex; justify-content: space-between; padding: 8px 12px; border-radius: 4px; background: #111; font-size: 13px; }
  .summary-row .label { color: #888; }
  .summary-row .status-good { color: #97C459; font-family: 'SF Mono', Monaco, monospace; font-size: 11px; font-weight: 600; }
  .summary-row .status-yellow { color: #C9922A; font-family: 'SF Mono', Monaco, monospace; font-size: 11px; font-weight: 600; }
  .summary-row .status-red { color: #F09595; font-family: 'SF Mono', Monaco, monospace; font-size: 11px; font-weight: 600; }
  .summary-row .status-dim { color: #555; font-family: 'SF Mono', Monaco, monospace; font-size: 11px; font-weight: 600; }
  .inspection-summary { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .inspection-summary .header { font-weight: 600; font-size: 15px; margin-bottom: 12px; }
  .decision-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .decision-card .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .decision-card .label { font-weight: 600; font-size: 15px; }
  .decision-card .phase { font-family: 'SF Mono', Monaco, monospace; font-size: 10px; color: #555; }
  .decision-card .inspection-note { font-size: 12px; color: #888; margin-bottom: 12px; padding: 8px 10px; background: #111; border-radius: 4px; line-height: 1.5; }
  .decision-card .inspection-note .status { color: #C9922A; font-weight: 600; }
  .decision-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .decision-option { flex: 1; min-width: calc(50% - 4px); padding: 10px 12px; border-radius: 6px; border: 1px solid #2a2a2a; background: #111; color: #888; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .decision-option.selected { background: #2a1f0a; border-color: #C9922A; color: #C9922A; font-weight: 600; }
  .line-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .line-item.included { background: #1a1a1a; border: 1px solid #2a2a2a; }
  .line-item.excluded { opacity: 0.4; border: 1px solid transparent; }
  .line-item .checkbox { width: 18px; height: 18px; border-radius: 3px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; font-weight: 700; color: #fff; }
  .line-item.included .checkbox { background: #C9922A; border-color: #C9922A; }
  .line-item .desc { flex: 1; font-size: 13px; line-height: 1.4; }
  .line-item .trade-tag { font-family: 'SF Mono', Monaco, monospace; font-size: 10px; color: #555; white-space: nowrap; }
  .phase-header { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: #C9922A; text-transform: uppercase; letter-spacing: 1px; margin-top: 16px; margin-bottom: 8px; }
  .phase-header:first-child { margin-top: 0; }
  .extras-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .extras-input-row input { flex: 1; padding: 10px 14px; border-radius: 6px; border: 1px solid #2a2a2a; background: #111; color: #f0ede8; font-size: 13px; font-family: inherit; outline: none; }
  .extras-input-row input:focus { border-color: #C9922A; }
  .extras-input-row button { padding: 10px 16px; border-radius: 6px; border: 1px solid #2a2a2a; background: #1a1a1a; color: #888; font-size: 13px; cursor: pointer; }
  .nav-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; position: fixed; bottom: 0; left: 0; right: 0; max-width: 720px; margin: 0 auto; padding: 12px 1.25rem; background: #111; border-top: 1px solid #2a2a2a; z-index: 100; }
  .btn-secondary { padding: 14px; border: 1px solid #2a2a2a; border-radius: 6px; background: #1a1a1a; color: #888; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-primary { padding: 14px; border: none; border-radius: 6px; background: #C9922A; color: #111; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .btn-primary:disabled { background: #2a2a2a; color: #444; cursor: not-allowed; }
  .loading-screen { text-align: center; padding: 3rem 1rem; }
  .spinner { width: 36px; height: 36px; border: 2px solid #2a2a2a; border-top-color: #C9922A; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { font-size: 13px; color: #F09595; margin-top: 0.875rem; text-align: center; }
  .missing-warning { background: rgba(212,74,74,0.1); border: 1px solid rgba(212,74,74,0.2); border-radius: 8px; padding: 16px; margin-top: 12px; }
  .missing-warning .title { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-weight: 600; font-size: 14px; color: #F09595; }
  .missing-item { padding: 12px 14px; border-radius: 6px; background: #1a1a1a; border: 1px solid #2a2a2a; margin-bottom: 8px; }
  .missing-item.unresolved { border-color: rgba(212,74,74,0.4); }
  .missing-item .top { display: flex; justify-content: space-between; align-items: center; }
  .missing-item .name { font-size: 14px; font-weight: 500; color: #f0ede8; }
  .missing-item .sub { font-size: 11px; color: #555; margin-top: 2px; }
  .resolution-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
  .resolution-btn { padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid #2a2a2a; background: transparent; color: #888; font-family: inherit; }
  .resolution-btn.na { border-color: #555; }
  .resolution-btn.na.active { background: #111; color: #f0ede8; font-weight: 600; }
  .resolution-btn.fill.active { border-color: #C9922A; background: rgba(201,146,42,0.12); color: #C9922A; font-weight: 600; }
  .resolution-btn.reinspect.active { border-color: #A32D2D; background: rgba(212,74,74,0.1); color: #F09595; font-weight: 600; }
  .fill-fields { display: grid; grid-template-columns: 180px 1fr; gap: 8px; margin-top: 10px; }
  @media (max-width: 480px) {
    .fill-fields { grid-template-columns: 1fr; }
  }
  .fill-fields select, .fill-fields input { padding: 8px 10px; border-radius: 4px; font-size: 12px; border: 1px solid #2a2a2a; background: #111; color: #f0ede8; outline: none; font-family: inherit; }
  .reinspect-msg { margin-top: 12px; padding: 8px 12px; border-radius: 4px; background: #111; font-size: 12px; color: #F09595; line-height: 1.5; }
  /* SOW final view */
  .sow-doc { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
  .sow-header { border-bottom: 1px solid #2a2a2a; padding-bottom: 16px; margin-bottom: 20px; }
  .sow-eyebrow { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; letter-spacing: 2px; color: #C9922A; text-transform: uppercase; margin-bottom: 8px; }
  .sow-h1 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
  .sow-h2 { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: #C9922A; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; margin-top: 24px; }
  .sow-meta-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; font-size: 13px; }
  @media (max-width: 480px) {
    .sow-meta-grid { grid-template-columns: 1fr 1fr; }
  }
  .sow-meta-grid .key { color: #555; }
  .sow-trade-section { margin-bottom: 16px; }
  .sow-trade-name { font-size: 13px; font-weight: 600; color: #C9922A; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #2a2a2a; }
  .sow-line { display: flex; gap: 8px; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #111; }
  .sow-line .phase-tag { color: #555; font-family: 'SF Mono', Monaco, monospace; font-size: 11px; flex-shrink: 0; }
  .labor-only-callout { background: rgba(201,146,42,0.12); border: 1px solid #C9922A; border-radius: 6px; padding: 10px 14px; margin-bottom: 12px; }
  .labor-only-title { font-size: 13px; font-weight: 700; color: #C9922A; margin-bottom: 2px; }
  .labor-only-body { font-size: 12px; color: #f0ede8; line-height: 1.5; }
  .supplies-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  @media (max-width: 480px) { .supplies-grid { grid-template-columns: 1fr; } }
  .supplies-box { background: #111; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px; }
  .supplies-box .heading { font-family: 'SF Mono', Monaco, monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 700; }
  .supplies-box.halstead .heading { color: #639922; }
  .supplies-box.contractor .heading { color: #888; }
  .supplies-box .body { font-size: 11px; color: #888; line-height: 1.6; }
  .bid-format-note { font-size: 11px; color: #555; line-height: 1.6; padding: 8px 12px; background: #111; border-radius: 4px; border-left: 3px solid #C9922A; }
  .bid-format-note strong { color: #888; }
  .critical-path-note { font-size: 11px; color: #555; line-height: 1.6; padding: 8px 12px; background: #111; border-radius: 4px; border-left: 3px solid #639922; margin-top: 12px; }
  .critical-path-note strong { color: #f0ede8; }
  .bid-grid { background: #111; border: 1px solid #2a2a2a; border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
  .bid-grid-header { display: grid; grid-template-columns: 1.4fr 0.8fr 0.7fr 1fr; font-family: 'SF Mono', Monaco, monospace; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px; background: #0a0a0a; border-bottom: 1px solid #2a2a2a; font-weight: 700; }
  .bid-grid-row { display: grid; grid-template-columns: 1.4fr 0.8fr 0.7fr 1fr; font-size: 13px; padding: 10px 12px; border-bottom: 1px solid #1a1a1a; align-items: center; }
  .bid-grid-row .col-c { text-align: center; color: #555; }
  .bid-grid-row .col-r { text-align: right; color: #555; font-family: 'SF Mono', Monaco, monospace; }
  .bid-grid-total { display: grid; grid-template-columns: 1.4fr 0.8fr 0.7fr 1fr; font-size: 13px; padding: 12px; background: rgba(201,146,42,0.12); align-items: center; font-weight: 700; color: #C9922A; }
  .bid-grid-total .col-c { text-align: center; }
  .bid-grid-total .col-r { text-align: right; font-family: 'SF Mono', Monaco, monospace; }
  .bid-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  @media (max-width: 480px) { .bid-meta-grid { grid-template-columns: 1fr; } }
  .bid-meta-box { background: #111; border: 1px solid #2a2a2a; border-radius: 6px; padding: 10px 12px; }
  .bid-meta-box .heading { font-family: 'SF Mono', Monaco, monospace; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .bid-meta-box .field { font-size: 13px; color: #555; }
  .photo-area { margin-bottom: 20px; }
  .photo-area-header { font-size: 13px; font-weight: 700; color: #C9922A; margin-bottom: 8px; padding: 6px 10px; background: rgba(201,146,42,0.12); border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .photo-item { margin-bottom: 12px; }
  .photo-item .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .photo-item .label { font-size: 13px; font-weight: 600; }
  .photo-item .count { font-family: 'SF Mono', Monaco, monospace; font-size: 10px; color: #555; }
  .photo-item .notes { font-size: 11px; color: #888; margin-bottom: 6px; font-style: italic; }
  .photo-thumbs { display: flex; gap: 6px; flex-wrap: wrap; }
  .photo-thumb { width: 80px; height: 80px; border-radius: 4px; object-fit: cover; border: 1px solid #2a2a2a; }

  @media print {
    body, #app { background: white !important; color: #111 !important; max-width: none !important; padding: 0 !important; }
    .top-bar { border-color: #ccc !important; }
    .step-pills, .step-label, .nav-row, #screen-1, #screen-2, #screen-3, #screen-4, .page-title, .page-subtitle { display: none !important; }
    #screen-5 { display: block !important; }
    .sow-doc { background: white !important; border: none !important; padding: 0 !important; color: #111 !important; }
    .sow-header { border-color: #ccc !important; }
    .sow-h1 { color: #111 !important; }
    .sow-h2 { color: #C9922A !important; page-break-after: avoid; }
    .sow-eyebrow { color: #C9922A !important; }
    .sow-meta-grid { color: #333 !important; }
    .sow-meta-grid .key { color: #888 !important; }
    .sow-trade-section { page-break-inside: avoid; }
    .sow-trade-name { color: #C9922A !important; border-color: #ccc !important; }
    .sow-line { color: #111 !important; border-color: #eee !important; page-break-inside: avoid; }
    .sow-line .phase-tag { color: #888 !important; }
    .summary-row { background: #f5f5f5 !important; color: #111 !important; }
    .summary-row .label { color: #555 !important; }
    .labor-only-callout { background: #fff8e8 !important; border-color: #C9922A !important; page-break-inside: avoid; }
    .labor-only-body { color: #111 !important; }
    .supplies-grid { page-break-inside: avoid; }
    .supplies-box { background: #f9f9f9 !important; border-color: #ccc !important; page-break-inside: avoid; }
    .supplies-box .body { color: #333 !important; }
    .bid-format-note, .critical-path-note { background: #f9f9f9 !important; color: #333 !important; }
    .bid-format-note strong, .critical-path-note strong { color: #111 !important; }
    .bid-grid { background: #f9f9f9 !important; border-color: #ccc !important; page-break-inside: avoid; }
    .bid-grid-header { background: #eee !important; color: #555 !important; border-color: #ccc !important; }
    .bid-grid-row { border-color: #eee !important; }
    .bid-grid-row > div, .bid-grid-row .col-c, .bid-grid-row .col-r { color: #333 !important; }
    .bid-grid-row > div:first-child { color: #111 !important; }
    .bid-grid-total { background: #fff8e8 !important; color: #C9922A !important; }
    .bid-meta-box { background: #f9f9f9 !important; border-color: #ccc !important; page-break-inside: avoid; }
    .bid-meta-box .heading { color: #888 !important; }
    .bid-meta-box .field { color: #333 !important; }
    .photo-area { page-break-inside: avoid; }
    .photo-area-header { background: #fff8e8 !important; color: #C9922A !important; }
    .photo-item { page-break-inside: avoid; }
    .photo-item .label { color: #111 !important; }
    .photo-item .notes { color: #555 !important; }
    .photo-thumb { border-color: #ccc !important; }
    button { display: none !important; }
  }

</style>
</head>
<body>
<div id="app">

  <div class="top-bar">
    <div id="logo-container"></div>
  </div>

  <div class="step-pills">
    <div class="step-pill" id="pill-1"></div>
    <div class="step-pill" id="pill-2"></div>
    <div class="step-pill" id="pill-3"></div>
    <div class="step-pill" id="pill-4"></div>
    <div class="step-pill" id="pill-5"></div>
  </div>
  <div class="step-label" id="step-label">Step 1 — Select Inspection</div>

  <!-- SCREEN 1: SELECT INSPECTION -->
  <div id="screen-1">
    <div class="page-title">Select Inspection</div>
    <div class="page-subtitle">Completed inspections ready for scoping</div>
    <div id="inspections-list">
      <div class="loading-screen">
        <div class="spinner"></div>
        <p style="color:#666;font-size:14px;">Loading inspections from Airtable...</p>
      </div>
    </div>
  </div>

  <!-- SCREEN 2: TURN TYPE -->
  <div id="screen-2" style="display:none;">
    <div class="page-title">Classify Turn</div>
    <div class="page-subtitle" id="screen-2-subtitle"></div>
    <div class="inspection-summary" id="inspection-summary"></div>
    <div class="section-label">Turn Classification</div>
    <div class="turn-grid">
      <div class="turn-btn" data-turn="Light" onclick="selectTurn('Light')">
        <div class="name">Light</div>
        <div class="phases">3 phases</div>
      </div>
      <div class="turn-btn" data-turn="Standard" onclick="selectTurn('Standard')">
        <div class="name">Standard</div>
        <div class="phases">7 phases</div>
      </div>
      <div class="turn-btn" data-turn="Heavy" onclick="selectTurn('Heavy')">
        <div class="name">Heavy</div>
        <div class="phases">13 phases</div>
      </div>
    </div>
    <div class="turn-desc" id="turn-desc"></div>
  </div>

  <!-- SCREEN 3: DECISIONS -->
  <div id="screen-3" style="display:none;">
    <div class="page-title">Scope Decisions</div>
    <div class="page-subtitle" id="decisions-subtitle"></div>
    <div id="decisions-list"></div>
  </div>

  <!-- SCREEN 4: REVIEW -->
  <div id="screen-4" style="display:none;">
    <div class="page-title">Review Scope</div>
    <div class="page-subtitle" id="review-subtitle"></div>
    <div id="line-items-list"></div>
    <div class="section-label" style="margin-top:20px;">Add Item</div>
    <div class="extras-input-row">
      <input type="text" id="extra-input" placeholder="Add a line item..." onkeydown="if(event.key==='Enter')addExtra()" />
      <button onclick="addExtra()">+ Add</button>
    </div>
  </div>

  <!-- SCREEN 5: GENERATED SOW -->
  <div id="screen-5" style="display:none;">
    <div class="page-title">Scope of Work</div>
    <div class="page-subtitle">Ready to send to contractors</div>
    <div id="sow-document"></div>
  </div>

  <div id="error-display" class="error-msg"></div>
</div>

<div class="nav-row" id="nav-row">
  <button class="btn-secondary" id="btn-back" onclick="goBack()" disabled>← Back</button>
  <button class="btn-primary" id="btn-next" onclick="goNext()" disabled>Continue →</button>
</div>

<script>

function fmtDate(iso) {
  if (!iso) return '';
  const d = iso.split('T')[0]; // YYYY-MM-DD
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  return `${parts[2]}-${parts[1]}-${parts[0]}`; // DD-MM-YYYY
}

// === CONDITION ROLLUP ===
// Map Airtable Area/Component pairs to SOW decision groups
function rollupConditions(conditions) {
  // conditions = array of {Area, Component, Status, Notes, Photo}
  const rollup = {
    flooring: null, paint: null,
    kitchen_cabinets: null, kitchen_countertop: null, kitchen_appliances: null,
    tub_surround: null, vanity: null, toilet: null,
    doors_hardware: null, electrical: null, lighting: null, blinds: null,
  };

  const worstStatus = (a, b) => {
    const order = ['Good', 'N/A', 'Cleaning', 'Repair', 'Replace'];
    if (!a) return b;
    if (!b) return a;
    return order.indexOf(b) > order.indexOf(a) ? b : a;
  };

  const merge = (key, c, area) => {
    if (!c || !c.Status) return;
    if (!rollup[key]) {
      rollup[key] = { area: area || c.Area, status: c.Status, notes: c.Notes || '', photos: (c.Photo || []).length };
    } else {
      rollup[key].status = worstStatus(rollup[key].status, c.Status);
      if (c.Notes) rollup[key].notes += (rollup[key].notes ? '; ' : '') + c.Notes;
      rollup[key].photos += (c.Photo || []).length;
    }
  };

  conditions.forEach(c => {
    const area = c.Area || '';
    const comp = c.Component || '';
    const a = area.toLowerCase(), p = comp.toLowerCase();

    // Flooring — any Floors component anywhere
    if (p === 'floors') merge('flooring', c, 'Living Room');
    // Paint — any Walls component anywhere
    if (p === 'walls') merge('paint', c, 'Living Room');
    // Kitchen
    if (a === 'kitchen' && p === 'cabinets') merge('kitchen_cabinets', c, 'Kitchen');
    if (a === 'kitchen' && (p === 'counters' || p === 'countertop')) merge('kitchen_countertop', c, 'Kitchen');
    if (a === 'kitchen' && (p === 'oven' || p === 'refrigerator' || p === 'dishwasher')) merge('kitchen_appliances', c, 'Kitchen');
    // Bathroom
    if (a.startsWith('bathroom') && (p === 'shower/tub' || p === 'shower/tub tiles')) merge('tub_surround', c, 'Bathroom');
    if (a.startsWith('bathroom') && (p === 'cabinets' || p === 'sink')) merge('vanity', c, 'Bathroom');
    if (a.startsWith('bathroom') && p === 'toilet') merge('toilet', c, 'Bathroom');
    // Doors & hardware — Entry door/locks + closets
    if ((a === 'entry' && (p === 'door' || p === 'locks')) || p === 'closet') merge('doors_hardware', c, 'Entry/Hallways');
    // Electrical
    if (a === 'mechanical' && (p === 'electrical outlets' || p === 'breaker panel' || p === 'thermostat')) merge('electrical', c, 'Mechanical');
    // Lighting
    if (p === 'lights') merge('lighting', c, 'Living Room');
    // Blinds
    if (p === 'blinds') merge('blinds', c, 'Living Room');
  });

  return rollup;
}

// === LINE ITEM GENERATION ===
function generateLineItems(turn, decs, conds, layout) {
  const phases = PHASE_MATRIX[turn] || [];
  const items = [];
  const isOneBed = layout && layout.toLowerCase().includes("1br");

  if (phases.includes(1)) {
    items.push({ phase: 1, trade: "General", desc: "Demo carpet and pad, remove old fixtures as scoped", include: true });
    if (conds.kitchen_countertop && conds.kitchen_countertop.status !== "Good") items.push({ phase: 1, trade: "General", desc: "Demo existing countertop", include: true });
  }

  if (phases.includes(2)) {
    const replacingKitchenSink = conds.kitchen_cabinets && conds.kitchen_cabinets.status !== "Good";
    const replacingVanity = decs.vanity_size && decs.vanity_size !== "Keep existing" && conds.vanity && conds.vanity.status !== "Good";
    const replacingToilet = decs.toilet === "Replace (Kohler Highline)";
    if (replacingKitchenSink) items.push({ phase: 2, trade: "Plumbing", desc: 'Replace kitchen sink angle stops (quarter-turn brass, 3/8" compression) — hot + cold', include: true });
    if (replacingVanity) items.push({ phase: 2, trade: "Plumbing", desc: 'Replace bathroom vanity angle stops (quarter-turn brass, 3/8" compression) — hot + cold', include: true });
    if (replacingToilet) items.push({ phase: 2, trade: "Plumbing", desc: 'Replace toilet angle stop (quarter-turn brass, 3/8" compression)', include: true });
    if (conds.electrical && conds.electrical.status !== "Good") {
      items.push({ phase: 2, trade: "Electrical", desc: "Install GFCI (Leviton GFTR1-W) in bathroom + within 6ft of kitchen sink", include: true });
      items.push({ phase: 2, trade: "Electrical", desc: "Replace toggle switches with Decora (5601-2W single / 5603-2W three-way)", include: true });
      items.push({ phase: 2, trade: "Electrical", desc: "Install Lutron Claro screwless plates on all outlets and switches", include: true });
    }
  }

  if (phases.includes(3)) {

  if (phases.includes(9) && conds.flooring && conds.flooring.status === "Replace") {

// === DATA LOADING ===
async function loadInspections() {
  try {
    // Get all completed inspections that haven't been scoped yet
    const url = `${AIRTABLE_API}/${BASE_ID}/${encodeURIComponent(INSPECTIONS_TABLE)}?filterByFormula=${encodeURIComponent("AND({Inspection Status}='Completed',OR({SOW Status}=BLANK(),{SOW Status}=''))")}&pageSize=100`;
    const resp = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` }});
    if (!resp.ok) throw new Error(`Airtable error ${resp.status}`);
    const data = await resp.json();
    allInspections = data.records || [];
    renderInspectionsList();
  } catch(e) {
    document.getElementById('inspections-list').innerHTML =
      `<div class="empty-state"><div class="title">Could not load inspections</div><div class="subtitle">${e.message}</div></div>`;
  }
}

async function loadConditionsForInspection(inspRecId) {
  if (conditionsByInspection[inspRecId]) return conditionsByInspection[inspRecId];
  const url = `${AIRTABLE_API}/${BASE_ID}/${encodeURIComponent(CONDITIONS_TABLE)}?filterByFormula=${encodeURIComponent(`SEARCH('${inspRecId}',ARRAYJOIN({Inspection ID}))`)}&pageSize=100`;
  const resp = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` }});
  const data = await resp.json();
  const conds = (data.records || []).map(r => r.fields);
  conditionsByInspection[inspRecId] = conds;
  return conds;
}

async function markInspectionScoped(inspRecId) {
  const url = `${AIRTABLE_API}/${BASE_ID}/${encodeURIComponent(INSPECTIONS_TABLE)}/${inspRecId}`;
  await fetch(url, {
    method: 'PATCH',
    headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: { 'SOW Status': 'Scoped' }})
  });
}

// === RENDER ===
function renderInspectionsList() {
  const list = document.getElementById('inspections-list');
  if (allInspections.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="title">All inspections have been scoped</div><div class="subtitle">New inspections will appear here when completed in Airtable</div></div>`;
    return;
  }
  list.innerHTML = allInspections.map(insp => {
    const f = insp.fields;
    const property = f.Property || 'Unknown property';
    const unit = f.Unit || '';
    const layout = `${f.Bedrooms || '?'}BR / ${f.Bathrooms || '?'}BA`;
    const date = f['Inspection Date'] || f['Created'] || '';
    const id = (f['Inspection ID'] && f['Inspection ID'][0]) ? f['Inspection ID'] : insp.id.substring(0, 10);
    return `
      <div class="inspection-card" id="card-${insp.id}" onclick="selectInspectionCard('${insp.id}')">
        <div class="inspection-card-header">
          <span class="inspection-card-title">${property} — ${unit}</span>
          <span class="inspection-card-id">${fmtDate(date)}</span>
        </div>
        <div class="inspection-card-meta">
          <span>${layout}</span>
        </div>
      </div>`;
  }).join('');
}

function selectInspectionCard(id) {
  selectedInspection = allInspections.find(i => i.id === id);
  document.querySelectorAll('.inspection-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`card-${id}`).classList.add('selected');
  document.getElementById('btn-next').disabled = false;
}

async function enterStep2() {
  // Load conditions for selected inspection
  document.getElementById('inspection-summary').innerHTML = '<div class="loading-screen"><div class="spinner"></div></div>';
  showStep(2);
  try {
    const conds = await loadConditionsForInspection(selectedInspection.id);
    const rollup = rollupConditions(conds);
    selectedInspection.rollup = rollup;
    selectedInspection.rawConditions = conds;
    renderInspectionSummary();
  } catch(e) {
    document.getElementById('inspection-summary').innerHTML = `<div class="empty-state"><div class="title">Could not load conditions</div><div class="subtitle">${e.message}</div></div>`;
  }
}

function renderInspectionSummary() {
  const f = selectedInspection.fields;
  const rollup = selectedInspection.rollup;
  document.getElementById('screen-2-subtitle').textContent = `${f.Property || ''} — ${f.Unit || ''}`;
  const labelMap = {
    flooring: 'Flooring', paint: 'Paint',
    kitchen_cabinets: 'Kitchen Cabinets', kitchen_countertop: 'Kitchen Counter', kitchen_appliances: 'Kitchen Appliances',
    tub_surround: 'Tub / Surround', vanity: 'Vanity', toilet: 'Toilet',
    doors_hardware: 'Doors / Hardware', electrical: 'Electrical', lighting: 'Lighting', blinds: 'Blinds',
  };
  let html = `<div class="header">${f.Property || ''} — ${f.Unit || ''}</div><div class="summary-grid">`;
  REQUIRED_KEYS.forEach(k => {
    const v = rollup[k];
    let statusClass = 'status-dim', statusText = '—';
    if (v) {
      statusText = v.status;
      if (v.status === 'Good') statusClass = 'status-good';
      else if (v.status === 'Replace') statusClass = 'status-red';
      else statusClass = 'status-yellow';
    }
    html += `<div class="summary-row"><span class="label">${labelMap[k]}</span><span class="${statusClass}">${statusText}</span></div>`;
  });
  html += '</div>';

  // Missing items warning
  const missing = REQUIRED_KEYS.filter(k => !rollup[k]);
  if (missing.length > 0) {
    html += `<div class="missing-warning"><div class="title">⚠ ${missing.length} item${missing.length>1?'s':''} not inspected</div>`;
    missing.forEach(k => {
      const r = missingResolutions[k] || {};
      const type = typeof r === 'object' ? r.type : r;
      html += `
        <div class="missing-item ${!type ? 'unresolved' : ''}" id="missing-${k}">
          <div class="top">
            <div>
              <div class="name">${labelMap[k]}</div>
              <div class="sub">No data from inspection</div>
            </div>
            <div class="resolution-buttons">
              <button class="resolution-btn na ${type==='na'?'active':''}" onclick="setMissingRes('${k}','na')">N/A</button>
              <button class="resolution-btn fill ${type==='fill'?'active':''}" onclick="setMissingRes('${k}','fill')">Fill in</button>
              <button class="resolution-btn reinspect ${type==='reinspect'?'active':''}" onclick="setMissingRes('${k}','reinspect')">Re-inspect</button>
            </div>
          </div>
          ${type==='fill' ? `
            <div class="fill-fields">
              <select onchange="setMissingFill('${k}','status',this.value)">
                <option value="">Select status...</option>
                <option value="Good" ${r.status==='Good'?'selected':''}>Good</option>
                <option value="Cleaning" ${r.status==='Cleaning'?'selected':''}>Cleaning</option>
                <option value="Repair" ${r.status==='Repair'?'selected':''}>Repair</option>
                <option value="Replace" ${r.status==='Replace'?'selected':''}>Replace</option>
                <option value="N/A" ${r.status==='N/A'?'selected':''}>N/A</option>
              </select>
              <input type="text" placeholder="Notes (optional)" value="${r.notes || ''}" oninput="setMissingFill('${k}','notes',this.value)" />
            </div>
          ` : ''}
        </div>`;
    });
    if (Object.values(missingResolutions).some(r => r === 'reinspect')) {
      html += `<div class="reinspect-msg">Items marked "Re-inspect" will block SOW generation. Send back to inspector to complete.</div>`;
    }
    html += '</div>';
  }
  document.getElementById('inspection-summary').innerHTML = html;
  updateNextButton();
}

function setMissingRes(key, type) {
  if (type === 'fill') missingResolutions[key] = { type: 'fill', status: '', notes: '' };
  else missingResolutions[key] = type;
  renderInspectionSummary();
}

function setMissingFill(key, field, value) {
  if (typeof missingResolutions[key] !== 'object') missingResolutions[key] = { type: 'fill', status: '', notes: '' };
  missingResolutions[key][field] = value;
  updateNextButton();
}

function effectiveRollup() {
  if (!selectedInspection || !selectedInspection.rollup) return {};
  const merged = { ...selectedInspection.rollup };
  Object.entries(missingResolutions).forEach(([key, r]) => {
    if (typeof r === 'object' && r.type === 'fill' && r.status) {
      merged[key] = { area: 'Other', status: r.status, notes: r.notes || 'Manually entered by PM', photos: 0, manuallyEntered: true };
    }
  });
  return merged;
}

function selectTurn(t) {
  turnType = t;
  document.querySelectorAll('.turn-btn').forEach(b => b.classList.toggle('selected', b.dataset.turn === t));
  const descs = {
    Light: 'Paint touch-up and blinds only. No trades.',
    Standard: 'Paint, flooring, doors/hardware, rough electrical. No kitchen/bath demo.',
    Heavy: 'Full renovation — demo, all trades, kitchen, bathroom, flooring, electrical finish.',
  };
  document.getElementById('turn-desc').textContent = descs[t];
  updateNextButton();
}

function renderDecisions() {
  const eff = effectiveRollup();
  const active = DECISION_POINTS.filter(d => d.trigger(eff));
  const f = selectedInspection.fields;
  document.getElementById('decisions-subtitle').textContent = `${active.length} decision${active.length!==1?'s':''} based on inspection findings`;
  if (active.length === 0) {
    document.getElementById('decisions-list').innerHTML = '<div class="empty-state"><div class="title">No decisions needed</div><div class="subtitle">All triggered conditions are clean. Continue to review scope.</div></div>';
    document.getElementById('btn-next').disabled = false;
    return;
  }
  document.getElementById('decisions-list').innerHTML = active.map(d => {
    const condKey = d.key === 'tub' || d.key === 'surround' ? 'tub_surround'
      : d.key === 'cabinets' ? 'kitchen_cabinets'
      : d.key === 'countertop' ? 'kitchen_countertop'
      : d.key === 'range' || d.key === 'fridge' ? 'kitchen_appliances'
      : d.key === 'vanity_size' ? 'vanity'
      : d.key;
    const cond = eff[condKey];
    return `
      <div class="decision-card">
        <div class="header">
          <span class="label">${d.label}</span>
          <span class="phase">Phase ${d.phase}</span>
        </div>
        ${cond ? `<div class="inspection-note">Inspection: <span class="status">${cond.status}</span>${cond.notes ? ' — ' + cond.notes : ''}${cond.photos ? ` (${cond.photos} photo${cond.photos>1?'s':''})` : ''}</div>` : ''}
        <div class="decision-options">
          ${d.options.map(opt => `<button class="decision-option ${decisions[d.key]===opt?'selected':''}" onclick="setDecision('${d.key}',${JSON.stringify(opt).replace(/"/g,'&quot;')})">${opt}</button>`).join('')}
        </div>
      </div>`;
  }).join('');
  updateNextButton();
}

function setDecision(key, value) {
  decisions[key] = value;
  renderDecisions();
}

function renderLineItems() {
  const eff = effectiveRollup();
  const f = selectedInspection.fields;
  const layout = `${f.Bedrooms || ''}BR/${f.Bathrooms || ''}BA`;
  lineItems = generateLineItems(turnType, decisions, eff, layout);
  document.getElementById('review-subtitle').textContent = `${lineItems.filter(i => i.include).length + extras.length} of ${lineItems.length + extras.length} items included`;

  // Group by phase
  const byPhase = {};
  lineItems.forEach((item, idx) => {
    const key = `Phase ${item.phase} — ${PHASE_NAMES[item.phase]}`;
    if (!byPhase[key]) byPhase[key] = [];
    byPhase[key].push({ item, idx });
  });

  let html = '';
  Object.entries(byPhase).forEach(([phaseLabel, items]) => {
    html += `<div class="phase-header">${phaseLabel}</div>`;
    items.forEach(({ item, idx }) => {
      html += `
        <div class="line-item ${item.include ? 'included' : 'excluded'}" onclick="toggleLineItem(${idx})">
          <div class="checkbox">${item.include ? '✓' : ''}</div>
          <div class="desc">${item.desc}</div>
          <div class="trade-tag">${item.trade}</div>
        </div>`;
    });
  });

  if (extras.length > 0) {
    html += `<div class="phase-header" style="color:#639922;">Added Items</div>`;
    extras.forEach((item, idx) => {
      html += `
        <div class="line-item included">
          <div class="checkbox">✓</div>
          <div class="desc">${item.desc}</div>
          <div class="trade-tag" onclick="removeExtra(${idx})" style="cursor:pointer;color:#A32D2D;">×</div>
        </div>`;
    });
  }

  document.getElementById('line-items-list').innerHTML = html;
  document.getElementById('btn-next').disabled = false;
}

function toggleLineItem(idx) {
  lineItems[idx].include = !lineItems[idx].include;
  renderLineItems();
}

function addExtra() {
  const inp = document.getElementById('extra-input');
  if (inp.value.trim()) {
    extras.push({ desc: inp.value.trim(), trade: 'Added', phase: 99 });
    inp.value = '';
    renderLineItems();
  }
}

function removeExtra(idx) {
  extras.splice(idx, 1);
  renderLineItems();
}

            Tape, rollers, brushes, trays, sandpaper<br/>
            Wire nuts, electrical tape, romex connectors<br/>
            Pipe dope, Teflon tape, plumber's putty<br/>
            Joint compound for small patches<br/>
            Shims, screws/nails in standard sizes<br/>
            PPE, dust masks, safety equipment<br/>
            Trash bags, shop vac bags<br/>
            Utility blades, mixing buckets<br/>
            Cleanup of own work area
          </div>
        </div>
      </div>
      <div class="bid-format-note">
        <strong>Bid format:</strong> Lump sum by trade with hours and crew size (see grid below). <strong>Substitutions:</strong> None permitted without written PM approval. <strong>Not in scope:</strong> Cleaning, punch/QC, re-key, lease handoff (PM-managed).
      </div>
    </div>`;

  // Bid response grid
  html += `
    <div style="margin-top:20px;">
      <div class="sow-h2">Contractor Bid Response</div>
      <div style="font-size:12px;color:#888;margin-bottom:12px;line-height:1.5;">
        Fill in only the trades you are bidding on. <strong style="color:#f0ede8;">Total Hours</strong> = labor hours summed across the entire crew (e.g. 2 workers × 8 hours = 16). <strong style="color:#f0ede8;">Crew Size</strong> = number of workers on site at once.
      </div>
      <div class="bid-grid">
        <div class="bid-grid-header">
          <div>Trade</div>
          <div style="text-align:center;">Total Hours</div>
          <div style="text-align:center;">Crew Size</div>
          <div style="text-align:right;">Lump Sum</div>
        </div>`;
  Object.keys(tradeGroups).filter(t => t !== 'Added').forEach(trade => {
    html += `<div class="bid-grid-row"><div style="color:#f0ede8;font-weight:500;">${trade}</div><div class="col-c">______</div><div class="col-c">____</div><div class="col-r">$ __________</div></div>`;
  });
  html += `
        <div class="bid-grid-total">
          <div>TOTAL</div>
          <div class="col-c">______</div>
          <div></div>
          <div class="col-r">$ __________</div>
        </div>
      </div>
      <div class="bid-meta-grid">
        <div class="bid-meta-box"><div class="heading">Earliest Start</div><div class="field">______ / ______ / ______</div></div>
        <div class="bid-meta-box"><div class="heading">Days to Complete</div><div class="field">______ days from materials staging</div></div>
      </div>
      <div class="bid-meta-box" style="margin-bottom:12px;">
        <div class="heading">Notes / Exclusions / Assumptions</div>
        <div class="field" style="line-height:2;">________________________________________________<br/>________________________________________________<br/>________________________________________________</div>
      </div>
      <div class="bid-meta-grid">
        <div class="bid-meta-box"><div class="heading">Contractor Name / Company</div><div class="field">______________________________</div></div>
        <div class="bid-meta-box"><div class="heading">Date / Signature</div><div class="field">____________________</div></div>
      </div>
      <div class="critical-path-note">
        <strong>Critical Path:</strong> Each line item is tagged with a phase number (P1–P12). Phases must execute in order across trades — for example, Phase 2 plumbing/electrical rough-in must be inspected and signed off before Phase 4 drywall begins, and Phase 5 paint must be complete before Phase 9 flooring. Within your own trade, sequencing is up to you. Coordinate handoffs with the PM at each phase boundary.
      </div>
    </div>`;

  // Photo appendix
  if (totalPhotos > 0) {
    html += `
      <div style="margin-top:24px;padding-top:20px;border-top:2px solid #2a2a2a;">
        <div class="sow-eyebrow">Appendix A</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:8px;">Inspection Photos</div>
        <div style="font-size:12px;color:#888;margin-bottom:16px;">${totalPhotos} photos across ${Object.keys(photosByArea).length} areas</div>`;
    Object.entries(photosByArea).forEach(([area, items]) => {
      html += `<div class="photo-area"><div class="photo-area-header">${area}</div>`;
      items.forEach(it => {
        html += `<div class="photo-item">
          <div class="label-row">
            <span class="label">${it.component}</span>
            <span class="count">${it.photos.length} photo${it.photos.length>1?'s':''}</span>
          </div>
          ${it.notes ? `<div class="notes">${it.notes}</div>` : ''}
          <div class="photo-thumbs">
            ${it.photos.map(p => `<img class="photo-thumb" src="${p.url || p.thumbnails?.large?.url || ''}" alt="" />`).join('')}
          </div>
        </div>`;
      });
      html += '</div>';
    });
    html += '</div>';
  }

  html += `</div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn-secondary" style="flex:1;" onclick="window.print()">Print / Save as PDF</button>
      <button class="btn-secondary" style="flex:1;" onclick="resetApp()">New SOW</button>
    </div>`;

  document.getElementById('sow-document').innerHTML = html;
}

// === STEP NAVIGATION ===
function showStep(n) {
  currentStep = n;
  for (let i = 1; i <= 5; i++) {
    document.getElementById(`screen-${i}`).style.display = i === n ? 'block' : 'none';
    const pill = document.getElementById(`pill-${i}`);
    pill.classList.toggle('active', i === n);
    pill.classList.toggle('done', i < n);
  }
  const labels = {
    1: 'Step 1 — Select Inspection',
    2: 'Step 2 — Classify Turn',
    3: 'Step 3 — Decision Points',
    4: 'Step 4 — Review Scope',
    5: 'Step 5 — SOW Generated',
  };
  document.getElementById('step-label').textContent = labels[n];
  document.getElementById('btn-back').disabled = n === 1;
  document.getElementById('btn-next').textContent = n === 4 ? 'Generate SOW →' : (n === 5 ? 'Done' : 'Continue →');
  document.getElementById('nav-row').style.display = n === 5 ? 'none' : 'grid';
  window.scrollTo(0, 0);
  updateNextButton();
}

function updateNextButton() {
  const btn = document.getElementById('btn-next');
  if (currentStep === 1) {
    btn.disabled = !selectedInspection;
  } else if (currentStep === 2) {
    const missing = REQUIRED_KEYS.filter(k => !selectedInspection?.rollup?.[k]);
    const unresolved = missing.filter(k => {
      const r = missingResolutions[k];
      if (!r) return true;
      if (typeof r === 'object' && r.type === 'fill' && !r.status) return true;
      return false;
    });
    const blocked = Object.values(missingResolutions).some(r => r === 'reinspect');
    btn.disabled = !turnType || unresolved.length > 0 || blocked;
    btn.textContent = blocked ? 'Blocked — Re-inspection Needed' : 'Continue →';
  } else if (currentStep === 3) {
    const eff = effectiveRollup();
    const active = DECISION_POINTS.filter(d => d.trigger(eff));
    btn.disabled = !active.every(d => decisions[d.key]);
  } else if (currentStep === 4) {
    btn.disabled = false;
  }
}

async function goNext() {
  if (currentStep === 1) await enterStep2();
  else if (currentStep === 2) {
    showStep(3);
    renderDecisions();
  }
  else if (currentStep === 3) {
    showStep(4);
    renderLineItems();
  }
  else if (currentStep === 4) {
    showStep(5);
    await renderSOW();
  }
}

function goBack() {
  if (currentStep === 1) return;
  if (currentStep === 2) { showStep(1); }
  else if (currentStep === 3) { showStep(2); renderInspectionSummary(); }
  else if (currentStep === 4) { showStep(3); renderDecisions(); }
}

function resetApp() {
  selectedInspection = null;
  turnType = null;
  decisions = {};
  missingResolutions = {};
  lineItems = [];
  extras = [];
  showStep(1);
  loadInspections();
}

// === INIT ===
loadInspections();
showStep(1);
</script>
